openapi: 3.0.3
info:
  title: Booking Platform API
  version: 1.0.0
  description: Authentication APIs

servers:
  - url: http://localhost:3000

paths:
  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login user and generate authentication key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Invalid or expired auth key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: auth_key

  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: johndoe
        password:
          type: string
          example: Password@123

    LoginResponse:
      type: object
      required:
        - auth_key
        - userId
        - role
        - name
      properties:
        auth_key:
          type: string
          example: a3f9c8b1e7d44e3c9f5b4d2a1c8e6f9a
        userId:
          type: integer
          example: 1
        role:
          type: string
          example: admin
        name:
          type: string
          example: John Doe

    RegisterRequest:
      type: object
      required:
        - username
        - password
        - role
        - first_name
        - last_name
        - phone
      properties:
        username:
          type: string
          example: johndoe
        password:
          type: string
          example: Password@123
        role:
          type: string
          example: member
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        phone:
          type: string
          example: "9876543210"

    RegisterResponse:
      type: object
      required:
        - message
        - userId
      properties:
        message:
          type: string
          example: User registered successfully
        userId:
          type: integer
          example: 10

    LogoutResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Logout successful

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Invalid username or password
