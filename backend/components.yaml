components:
  schemas:
    Post:
      type: object
      required:
        - user_id
        - title
        - content
      properties:
        user_id:
          type: integer
          example: 1
          description: ID of the user creating the post
        title:
          type: string
          example: "My first apipost"
          description: The title of the post
        content:
          type: string
          example: "This is the content of the post"
          description: The main body content of the post

  responses:
    Created:
      description: "A new item was created"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Post created successfully"
              post:
                type: object
                properties:
                  id:
                    type: integer
                    example: 5
                  user_id:
                    type: integer
                    example: 1
                  title:
                    type: string
                    example: "My first apipost"
                  content:
                    type: string
                    example: "This is the content of the post"
                  createdAt:
                    type: string
                    format: date-time
                    example: "2025-11-13T04:30:00.000Z"

    Error:
      description: "An error has occurred"
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                example: "Something went wrong"
              errors:
                type: array
                items:
                  type: string
